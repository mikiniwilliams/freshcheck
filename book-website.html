<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book Your Call · Website Glow-Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--bg:#0b0b0b;--panel:#131313;--ink:#050505;--cream:#ece7dc;--cream-dim:#b9b2a6;--cream-hi:#fffaf0;--red:#db3330;--red-dark:#b62320;--gold:#caa24a;--line:rgba(236,231,220,.14)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  background:radial-gradient(circle at top, rgba(202,162,74,.14), transparent 30%), linear-gradient(180deg, #101010 0%, var(--bg) 46%);
  color:var(--cream);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.65;
}
.wrap{max-width:900px;margin:0 auto;padding:20px 20px 80px}
.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px 0 28px}
.brand,.back-link{font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:13px}
.brand{color:var(--cream-dim)}
.back-link{color:var(--cream-dim);text-decoration:none}
.back-link:hover{color:var(--cream);text-decoration:underline}
.card{border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)), var(--panel);box-shadow:10px 10px 0 var(--ink);padding:28px}
.eyebrow{margin:0 0 14px;color:var(--gold);font-size:14px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
.display{font-family:'Anton',Impact,sans-serif;text-transform:uppercase;letter-spacing:.01em;line-height:.96;margin:0}
.display.hero{font-size:clamp(38px,8vw,66px)}
.lead{font-size:18px;max-width:58ch}
.embed{margin-top:22px;border:1px solid rgba(236,231,220,.12);background:rgba(255,255,255,.03);padding:12px}
iframe{display:block;width:100%;border:none;overflow:hidden;min-height:760px}
.note{margin-top:10px;color:var(--cream-dim);font-size:14px}
.btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  text-decoration:none;cursor:pointer;
  background:var(--red);color:var(--cream-hi);
  border:2px solid var(--ink);box-shadow:6px 6px 0 var(--ink);
  padding:16px 24px;
  font-family:'Anton',Impact,sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:.06em;
}
.btn:hover{background:var(--red-dark)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand">Pimp My Website™</div>
      <a class="back-link" href="/offer">← Back to offer</a>
    </div>
    <section class="card">
      <p class="eyebrow">Payment complete</p>
      <h1 class="display hero">Book your Website Glow-Up Strategy Call</h1>
      <p class="lead">Your spot is reserved. Pick your time below and we’ll use the call to map out your one-page website glow-up.</p>
      <div class="embed">
        <iframe src="https://api.growthhub365.com/widget/booking/lpUP2Dq5oAuxq58CCsRM" id="lpUP2Dq5oAuxq58CCsRM_1781418875430" scrolling="no" title="Website Glow-Up Strategy Call"></iframe>
        <div class="note">This booking page opens after your payment is complete.</div>
      </div>
      <div class="btn-row">
        <a class="btn" href="/offer">Back to offer</a>
      </div>
    </section>
  </main>
  <script src="https://api.growthhub365.com/js/form_embed.js" type="text/javascript"></script>
</body>
</html>
