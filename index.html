<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The FRESH™ Check · Pimp My Website™</title>

<!-- Fonts: same stack as pimpmywebsitenow.com -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet" />

<script>
/* ============================================================
   WHITE-LABEL CONFIG — edit this block per client. Nothing
   below this block needs to change for a re-skin.
   ============================================================ */
const CONFIG = {
  brandName: "Pimp My Website™",
  frameworkName: "FRESH™",
  byline: "From DAY1044 Solutions · pimpmywebsitenow.com",

  // Where the final CTA button sends people
  ctaUrl: "/offer",
  offerLine: "One page. One week. $300.",
  offerSub: "Pimp My Website™ rebuilds your site as a single FRESH page designed to turn visitors into customers.",

  // Colors — pulled from pimpmywebsitenow.com's stylesheet
  colors: {
    bg:        "#0E0D0B",  // page background (warm near-black)
    card:      "#171614",  // card surface
    cardAlt:   "#201F1D",  // raised surface
    ink:       "#080706",  // shadows / borders on light elements
    cream:     "#E6E1D4",  // primary text
    creamDim:  "#B4B1A8",  // secondary text
    creamHi:   "#F2EEE3",  // bright text on red
    red:       "#DB3330",  // brand red
    redDark:   "#B2201D",  // hover red
    gold:      "#CCA641",  // brand gold
    fresh:     "#5BAE7C"   // "good score" green
  },

  // LEAD CAPTURE (optional GHL hookup)
  // Set enabled:true and paste a GHL Inbound Webhook URL to gate
  // the full pillar breakdown behind name + email. The score itself
  // is always shown free. Payload sent: { name, email, score,
  // maxScore, verdict, pillars: {F,R,E,S,H}, weakestPillar }
  leadCapture: {
    enabled: true,
    webhookUrl: "https://services.leadconnectorhq.com/hooks/pp1sx243z5IZJ7vdSzxQ/webhook-trigger/kpGWZrM9cS8S5DFD49ZN",
    headline: "Want the full breakdown?",
    sub: "Drop your name and email and we'll unlock your pillar-by-pillar scores — plus what to fix first.",
    buttonText: "Show My Full Breakdown",
    skipText: "No thanks, just the score"
  }
};
</script>

<style>
:root{
  --bg:#0E0D0B!important; --card:#171614!important; --card-alt:#201F1D!important; --ink:#080706!important;
  --cream:#E6E1D4!important; --cream-dim:#B4B1A8!important; --cream-hi:#F2EEE3!important;
  --red:#DB3330!important; --red-dark:#B2201D!important; --gold:#CCA641!important; --fresh:#5BAE7C!important;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%}
body{
  background:var(--bg); color:var(--cream);
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
  font-size:17px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:680px;margin:0 auto;padding:48px 20px 72px}

.display{
  font-family:'Anton',Impact,'Helvetica Neue',sans-serif;
  font-weight:400; text-transform:uppercase;
  letter-spacing:.01em; line-height:1.02; margin:0;
}
.marker{font-family:'Permanent Marker','Comic Sans MS',cursive}
.eyebrow{
  font-family:'Permanent Marker',cursive; font-size:17px;
  color:var(--gold); letter-spacing:.02em; margin:0 0 14px;
}
.dim{color:var(--cream-dim)}
.center{text-align:center}

/* FRESH letter tiles */
.tiles{display:flex;gap:10px;justify-content:center}
.tile{
  font-family:'Anton',Impact,sans-serif;
  width:52px;height:52px;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  background:var(--card-alt); color:var(--cream-dim);
  border:2px solid rgba(230,225,212,.18);
  box-shadow:3px 3px 0 var(--ink); user-select:none;
  transition:background .35s,color .35s,transform .35s,border-color .35s;
}
.tiles.lg .tile{width:74px;height:74px;font-size:40px}
@media(min-width:560px){.tiles.lg .tile{width:96px;height:96px;font-size:54px}}
.tile.lit{background:var(--red);color:var(--cream-hi);border-color:var(--red);transform:translateY(-3px)}
.tile.active{background:var(--gold);color:var(--ink);border-color:var(--gold);transform:translateY(-3px)}
.tile:nth-child(1){rotate:-3deg}.tile:nth-child(2){rotate:2deg}.tile:nth-child(3){rotate:-1.5deg}.tile:nth-child(4){rotate:2.5deg}.tile:nth-child(5){rotate:-2deg}

/* Answer options */
.option{
  display:block;width:100%;text-align:left;cursor:pointer;
  background:var(--card); color:var(--cream);
  border:2px solid rgba(230,225,212,.18);
  padding:16px 18px;font-size:16.5px;font-weight:500;
  font-family:'Inter',sans-serif;
  box-shadow:4px 4px 0 var(--ink);
  transition:transform .12s,box-shadow .12s,border-color .12s,background .12s;
}
.option:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);border-color:var(--gold);background:var(--card-alt)}
.option:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.option:focus-visible{outline:3px solid var(--red);outline-offset:2px}
.option + .option{margin-top:14px}

/* Buttons */
.btn{
  display:inline-block;background:var(--red);color:var(--cream-hi);
  border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);
  padding:16px 32px;cursor:pointer;text-decoration:none;
  font-family:'Anton',Impact,sans-serif;font-size:18px;
  text-transform:uppercase;letter-spacing:.05em;
  transition:transform .12s,box-shadow .12s,background .12s;
}
.btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink);background:var(--red-dark)}
.btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink)}
.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.btn-ghost{background:none;border:none;color:var(--cream-dim);cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;padding:8px 4px}
.btn-ghost:hover{color:var(--cream);text-decoration:underline}

/* Cards */
.card{background:var(--card);border:2px solid rgba(230,225,212,.18);box-shadow:6px 6px 0 var(--ink);padding:26px}
.card-gold{border-color:var(--gold)}

/* Bars + meter */
.bar-row{margin-bottom:16px}
.bar-head{display:flex;justify-content:space-between;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.bar-track{height:18px;border:2px solid rgba(230,225,212,.25);background:var(--card);overflow:hidden}
.bar-fill{height:100%;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.meter{height:38px;border:2px solid rgba(230,225,212,.25);background:var(--card);box-shadow:5px 5px 0 var(--ink);overflow:hidden;margin:0 0 40px}
.meter-fill{height:100%;width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);
  background:repeating-linear-gradient(135deg,var(--red),var(--red) 14px,var(--red-dark) 14px,var(--red-dark) 28px)}

/* Lead form */
.field{width:100%;padding:14px 16px;font-size:16px;font-family:'Inter',sans-serif;
  background:var(--card-alt);color:var(--cream);border:2px solid rgba(230,225,212,.25);margin-bottom:14px}
.field:focus{outline:none;border-color:var(--gold)}
.field::placeholder{color:var(--cream-dim)}

.fade{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.progress-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
.progress-head .tiles{justify-content:flex-start}
.progress-head .tile{width:40px;height:40px;font-size:19px}
.count{font-size:13px;letter-spacing:.12em;color:var(--cream-dim);font-weight:600}
h1.hero{font-size:clamp(44px,9vw,76px);margin:0 0 22px}
h2.q{font-size:clamp(26px,5.5vw,36px);margin:0 0 30px;text-transform:none;letter-spacing:0;line-height:1.15;font-family:'Inter',sans-serif;font-weight:700}
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<script>
/* ============================================================
   QUIZ CONTENT — edit questions/copy here if needed
   ============================================================ */
const PILLARS = [
  { letter:"F", name:"Focused", tagline:"One site. One job. One clear next step.",
    questions:[
      { q:"A stranger lands on your homepage. Can they tell what you do in 5 seconds?",
        options:[["Instantly — the headline says it all",2],["Sort of, if they read a bit",1],["They'd have to dig for it",0]] },
      { q:"How many things does your homepage ask visitors to do?",
        options:[["One clear action, repeated",2],["A few competing asks",1],["It's a buffet — links everywhere",0]] },
      { q:"Who is your site written for?",
        options:[["One specific kind of customer",2],["A general audience",1],["Honestly… everyone",0]] }
    ]},
  { letter:"R", name:"Responsive", tagline:"Most of your visitors are on a phone. Right now.",
    questions:[
      { q:"Pull your site up on your phone. How does it look?",
        options:[["Clean — built for mobile",2],["Usable, but cramped",1],["A mess of tiny text",0]] },
      { q:"How fast does it load on mobile data?",
        options:[["Snappy — under 3 seconds",2],["A noticeable wait",1],["Long enough to lose people",0]] },
      { q:"Tapping buttons and links on mobile is…",
        options:[["Easy — big, thumb-friendly targets",2],["Hit or miss",1],["Pinch-and-zoom required",0]] }
    ]},
  { letter:"E", name:"Essential", tagline:"Everything on the page earns its spot — or it goes.",
    questions:[
      { q:"Be honest about your homepage content:",
        options:[["Every section earns its spot",2],["There's some filler",1],["Walls of text and stock photos",0]] },
      { q:"How current is what's on the site?",
        options:[["Updated within the last few months",2],["Sometime this year… probably",1],["There's an old year in the footer",0]] },
      { q:"Your navigation menu:",
        options:[["A few clear pages",2],["Getting crowded",1],["Dropdowns inside dropdowns",0]] }
    ]},
  { letter:"S", name:"Strategic", tagline:"A website isn't decoration. It's a salesperson.",
    questions:[
      { q:"Can a visitor contact or book you in one click?",
        options:[["Yes — from anywhere on the page",2],["If they hunt for it",1],["There's an email buried somewhere",0]] },
      { q:"When someone fills out your form (if you have one)…",
        options:[["It's wired to automatic follow-up",2],["It lands in an inbox someone checks",1],["There's no form / nobody monitors it",0]] },
      { q:"Proof you're good at what you do — reviews, results, testimonials:",
        options:[["Front and center",2],["A few, somewhere on the site",1],["None on the site",0]] }
    ]},
  { letter:"H", name:"High-Impact", tagline:"Your site should win business, not just exist.",
    questions:[
      { q:"First impression of the design:",
        options:[["Looks current and professional",2],["Dated, but okay",1],["I'd rather you not look at it",0]] },
      { q:"Does your website actually bring you business?",
        options:[["Regularly — leads come through it",2],["Occasionally",1],["It's a digital business card",0]] },
      { q:"Would you put the link in your bio?",
        options:[["It's already there",2],["With a disclaimer",1],["I avoid sharing it",0]] }
    ]}
];

const VERDICTS = [
  { min:25, title:"Certified Fresh", cta:"View the Offer",
    blurb:"Your site is doing its job. The wins now are in the details — sharper copy, faster follow-up, and keeping it that way as your business grows." },
  { min:17, title:"Fresh-ish", cta:"See the Offer",
    blurb:"The bones are there, but you're leaking leads in a few spots. A focused one-page rebuild would tighten the message and close the gaps fast." },
  { min:9, title:"Going Stale", cta:"Claim the Offer",
    blurb:"Your website is costing you customers you never see. The fix isn't a months-long project — it's one focused page that does the job properly." },
  { min:0, title:"Full Glow-Up Needed", cta:"Start the Offer",
    blurb:"No sugarcoating: your site is working against you. Good news — you don't need a $5,000 agency build. You need one FRESH page, this week." }
];

/* ============================================================
   APP LOGIC — no edits needed below
   ============================================================ */
(function(){
  // Apply CONFIG colors to CSS variables
  const c = CONFIG.colors, r = document.documentElement.style;
  r.setProperty('--bg',c.bg); r.setProperty('--card',c.card); r.setProperty('--card-alt',c.cardAlt);
  r.setProperty('--ink',c.ink); r.setProperty('--cream',c.cream); r.setProperty('--cream-dim',c.creamDim);
  r.setProperty('--cream-hi',c.creamHi); r.setProperty('--red',c.red); r.setProperty('--red-dark',c.redDark);
  r.setProperty('--gold',c.gold); r.setProperty('--fresh',c.fresh);

  const TOTAL = PILLARS.reduce((n,p)=>n+p.questions.length,0);
  const MAX = TOTAL*2;
  const app = document.getElementById('app');
  let answers = [];

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

  function tiles(size, lit, active){
    return `<div class="tiles ${size}">` + PILLARS.map((p,i)=>
      `<div class="tile ${i<lit?'lit':''} ${i===active?'active':''}">${p.letter}</div>`).join('') + `</div>`;
  }

  function intro(){
    app.innerHTML = `
      <div class="fade center">
        <p class="eyebrow">${esc(CONFIG.brandName)} · The ${esc(CONFIG.frameworkName)} Check</p>
        <h1 class="display hero">Is your website <span style="color:var(--red)">fresh</span> — or just sitting there?</h1>
        <div style="margin:30px 0 34px">${tiles('lg',0,-1)}</div>
        <p style="max-width:520px;margin:0 auto 8px">15 quick questions. Two minutes. We'll grade your website against the five things every money-making page gets right: <strong>Focused, Responsive, Essential, Strategic, High-Impact.</strong></p>
        <p class="dim" style="max-width:520px;margin:0 auto 36px">No email required to see your score. Just honest answers.</p>
        <button class="btn" id="start">Run the FRESH Check</button>
        <p class="marker dim" style="margin-top:44px;font-size:15px">${esc(CONFIG.byline)}</p>
      </div>`;
    document.getElementById('start').onclick = ()=>{ answers=[]; question(); };
  }

  function locate(idx){
    let rem = idx, pi = 0;
    for(const p of PILLARS){ if(rem < p.questions.length) break; rem -= p.questions.length; pi++; }
    return [pi, rem];
  }

  function question(){
    const idx = answers.length;
    const [pi, qi] = locate(idx);
    const p = PILLARS[pi], q = p.questions[qi];
    app.innerHTML = `
      <div class="fade">
        <div class="progress-head">
          ${tiles('', pi, pi)}
          <span class="count">${idx+1} / ${TOTAL}</span>
        </div>
        <p class="eyebrow">${p.letter} is for ${p.name}</p>
        <p class="dim" style="font-style:italic;margin:0 0 26px">${p.tagline}</p>
        <h2 class="q">${q.q}</h2>
        <div>${q.options.map((o,i)=>`<button class="option" data-p="${o[1]}">${esc(o[0])}</button>`).join('')}</div>
        ${idx>0?`<div style="margin-top:28px"><button class="btn-ghost" id="back">← Back</button></div>`:''}
      </div>`;
    app.querySelectorAll('.option').forEach(b=>b.onclick=()=>{
      answers.push(+b.dataset.p);
      answers.length >= TOTAL ? afterQuiz() : question();
    });
    const back = document.getElementById('back');
    if(back) back.onclick = ()=>{ answers.pop(); question(); };
    window.scrollTo({top:0});
  }

  function compute(){
    const total = answers.reduce((a,b)=>a+b,0);
    const verdict = VERDICTS.find(v=>total>=v.min);
    let start = 0;
    const pillars = PILLARS.map(p=>{
      const score = answers.slice(start, start+p.questions.length).reduce((a,b)=>a+b,0);
      start += p.questions.length;
      return {letter:p.letter, name:p.name, tagline:p.tagline, score};
    });
    const weakest = [...pillars].sort((a,b)=>a.score-b.score)[0];
    return {total, verdict, pillars, weakest};
  }

  function afterQuiz(){
    const lc = CONFIG.leadCapture;
    (lc.enabled && lc.webhookUrl) ? leadGate() : results(true);
  }

  function leadGate(){
    const {total, verdict} = compute();
    const pct = Math.round(total/MAX*100);
    app.innerHTML = `
      <div class="fade center">
        <p class="eyebrow">Your ${esc(CONFIG.frameworkName)} Score</p>
        <h1 class="display" style="font-size:clamp(40px,8vw,64px);margin-bottom:8px">${verdict.title}</h1>
        <p class="display" style="font-size:26px;color:var(--cream-dim);margin-bottom:24px">${total} / ${MAX}</p>
        <div class="meter"><div class="meter-fill" id="mfill"></div></div>
        <div class="card card-gold" style="text-align:left;max-width:460px;margin:0 auto">
          <p class="marker" style="color:var(--gold);font-size:20px;margin:0 0 8px">${esc(CONFIG.leadCapture.headline)}</p>
          <p class="dim" style="margin:0 0 18px">${esc(CONFIG.leadCapture.sub)}</p>
          <input class="field" id="lc-name" type="text" placeholder="Your name" autocomplete="name">
          <input class="field" id="lc-email" type="email" placeholder="you@business.com" autocomplete="email">
          <p id="lc-err" style="color:var(--red);font-size:14px;font-weight:600;display:none;margin:0 0 12px">Please enter a valid name and email.</p>
          <button class="btn" id="lc-go" style="width:100%">${esc(CONFIG.leadCapture.buttonText)}</button>
          <div style="text-align:center;margin-top:12px"><button class="btn-ghost" id="lc-skip">${esc(CONFIG.leadCapture.skipText)}</button></div>
        </div>
      </div>`;
    requestAnimationFrame(()=>{ document.getElementById('mfill').style.width = Math.max(pct,4)+'%'; });
    document.getElementById('lc-skip').onclick = ()=>results(false);
    document.getElementById('lc-go').onclick = ()=>{
      const name = document.getElementById('lc-name').value.trim();
      const email = document.getElementById('lc-email').value.trim();
      if(!name || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
        document.getElementById('lc-err').style.display='block'; return;
      }
      sendLead(name,email);
      results(true);
    };
  }

  function sendLead(name,email){
    const {total, verdict, pillars, weakest} = compute();
    const payload = {
      name, email, score: total, maxScore: MAX, verdict: verdict.title,
      pillars: Object.fromEntries(pillars.map(p=>[p.letter, p.score])),
      weakestPillar: weakest.name, source: "FRESH Check"
    };
    try{
      fetch(CONFIG.leadCapture.webhookUrl, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload), keepalive:true
      }).catch(()=>{});
    }catch(e){}
  }

  function results(full){
    const {total, verdict, pillars, weakest} = compute();
    const pct = Math.round(total/MAX*100);
    const barColor = s => s>=5 ? 'var(--fresh)' : s>=3 ? 'var(--gold)' : 'var(--red)';

    const breakdown = full ? `
      <h2 class="display" style="font-size:24px;margin:0 0 20px">The breakdown</h2>
      <div style="margin-bottom:34px">
        ${pillars.map(p=>`
          <div class="bar-row">
            <div class="bar-head"><span>${p.letter} · ${p.name}</span><span class="dim">${p.score}/6</span></div>
            <div class="bar-track"><div class="bar-fill" data-w="${Math.max(p.score/6*100,3)}" style="background:${barColor(p.score)}"></div></div>
          </div>`).join('')}
      </div>
      <div class="card card-gold" style="margin-bottom:44px;padding:20px 22px">
        <p class="marker" style="color:var(--gold);font-size:19px;margin:0 0 6px">Biggest opportunity</p>
        <p style="margin:0"><strong>${weakest.letter} — ${weakest.name}.</strong> ${weakest.tagline} This is where a rebuilt page pays for itself first.</p>
      </div>` : `
      <div class="card" style="margin-bottom:44px;text-align:center">
        <p class="dim" style="margin:0">Full pillar-by-pillar breakdown reserved. Your score still tells the story below.</p>
      </div>`;

    app.innerHTML = `
      <div class="fade">
        <div style="display:flex;justify-content:center;margin-bottom:30px">${tiles('',5,-1)}</div>
        <p class="eyebrow center">Your ${esc(CONFIG.frameworkName)} Score</p>
        <h1 class="display center" style="font-size:clamp(44px,9vw,70px);margin-bottom:8px">${verdict.title}</h1>
        <p class="display center" style="font-size:26px;color:var(--cream-dim);margin-bottom:26px">${total} / ${MAX}</p>
        <div class="meter"><div class="meter-fill" id="mfill"></div></div>
        <div class="card" style="margin-bottom:40px"><p style="margin:0;font-size:18px">${verdict.blurb}</p></div>
        ${breakdown}
        <div class="center">
          <p class="display" style="font-size:clamp(26px,5vw,34px);margin-bottom:10px">${esc(CONFIG.offerLine)}</p>
          <p class="dim" style="max-width:440px;margin:0 auto 28px">${esc(CONFIG.offerSub)}</p>
          <a class="btn" href="${CONFIG.ctaUrl}" target="_blank" rel="noopener noreferrer">${verdict.cta}</a>
          <div style="margin-top:30px"><button class="btn-ghost" id="restart">↺ Retake the check</button></div>
        </div>
      </div>`;
    requestAnimationFrame(()=>{
      document.getElementById('mfill').style.width = Math.max(pct,4)+'%';
      app.querySelectorAll('.bar-fill').forEach(b=>b.style.width = b.dataset.w+'%');
    });
    document.getElementById('restart').onclick = ()=>{ answers=[]; intro(); };
    window.scrollTo({top:0});
  }

  intro();
})();
</script>
</body>
</html>
